const isConfigured = FIREBASE_CONFIG.apiKey !== "TU_API_KEY";

function genCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s="";
  for(let i=0;i<8;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

function renderGateSetupWarning(){
  document.getElementById('gate-content').innerHTML = `
    <div class="gate-emoji">⚙️</div>
    <h1>Falta configurar Firebase</h1>
    <div class="gate-setup-warning">
      Este archivo todavía tiene los datos de ejemplo (TU_API_KEY, etc).
      Abre el archivo .html, busca la sección "CONFIGURA TU PROYECTO DE FIREBASE"
      cerca del inicio, y reemplaza esos valores por los de tu propio proyecto
      de Firebase (gratis, en console.firebase.google.com).
    </div>
  `;
}

function renderGateForm(){
  document.getElementById('gate-content').innerHTML = `
    <div class="gate-emoji">💪</div>
    <h1>Rutina · Tracker</h1>
    <p class="gate-sub">Para usar el mismo progreso en cualquier celular o computador, escribe tu código o crea uno nuevo.</p>
    <div id="gate-error" class="gate-error" style="display:none"></div>
    <input id="gate-input" class="gate-input" type="text" placeholder="TU CÓDIGO" maxlength="12" autocapitalize="characters" autocomplete="off"/>
    <button id="gate-enter" class="gate-btn gate-btn-primary">Entrar con este código</button>
    <div class="gate-divider">— o —</div>
    <button id="gate-new" class="gate-btn gate-btn-secondary">Crear código nuevo</button>
    <div id="gate-newcode" style="display:none">
      <p class="gate-sub">Guarda este código — lo necesitarás para entrar desde otro dispositivo:</p>
      <div id="gate-code-display" class="gate-code"></div>
      <button id="gate-continue" class="gate-btn gate-btn-primary">Ya lo guardé, continuar</button>
    </div>
  `;
  document.getElementById('gate-enter').onclick = async () => {
    const val = document.getElementById('gate-input').value.trim().toUpperCase();
    if(!val){ showGateError('Escribe un código, o crea uno nuevo.'); return; }
    await startWithCode(val);
  };
  document.getElementById('gate-new').onclick = () => {
    const code = genCode();
    document.getElementById('gate-code-display').textContent = code;
    document.getElementById('gate-newcode').style.display = 'block';
    document.getElementById('gate-continue').onclick = async () => { await startWithCode(code); };
  };
}

function showGateError(msg){
  const el = document.getElementById('gate-error');
  if(!el) return;
  el.textContent = msg;
  el.style.display = 'block';
}

function showConnecting(){
  document.getElementById('gate-content').innerHTML = `
    <div class="gate-emoji">💪</div>
    <h1>Rutina · Tracker</h1>
    <p class="gate-loading">Conectando…</p>
  `;
}

async function initFirestoreStorage(code){
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  await firebase.auth().signInAnonymously();
  const db = firebase.firestore();
  const docRef = db.collection("trackers").doc(code);

  window.storage = {
    async get(key){
      try{
        const snap = await docRef.get();
        if(!snap.exists) return null;
        const data = snap.data();
        if(!(key in data) || data[key] === undefined) return null;
        return { key, value: data[key] };
      }catch(e){ console.error("storage.get error", e); return null; }
    },
    async set(key, value){
      try{
        await docRef.set({ [key]: value }, { merge: true });
        return { key, value };
      }catch(e){ console.error("storage.set error", e); return null; }
    },
    async delete(key){
      try{
        await docRef.update({ [key]: firebase.firestore.FieldValue.delete() });
        return { key, deleted: true };
      }catch(e){ console.error("storage.delete error", e); return null; }
    },
    async list(prefix){
      try{
        const snap = await docRef.get();
        if(!snap.exists) return { keys: [] };
        const keys = Object.keys(snap.data()).filter(k => !prefix || k.startsWith(prefix));
        return { keys };
      }catch(e){ return null; }
    }
  };
}

async function startWithCode(code){
  showConnecting();
  try{ localStorage.setItem('trk_sync_code', code); }catch(e){}
  try{
    await initFirestoreStorage(code);
  }catch(e){
    console.error(e);
    renderGateForm();
    showGateError('No se pudo conectar. Revisa tu configuración de Firebase y tu conexión a internet.');
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('root').style.display = 'block';
  window.__renderApp();
}

async function boot(){
  if(!isConfigured){ renderGateSetupWarning(); return; }
  let code;
  try{ code = localStorage.getItem('trk_sync_code'); }catch(e){}
  if(code){ await startWithCode(code); return; }
  renderGateForm();
}

window.addEventListener('load', boot);
</script>

// ── MODAL EJERCICIO ───────────────────────────────────────────────────────────
function ExModal({ex,wp,existing,onSave,onAutoSave,onClose,bodyWeight=105}) {
  const targetSets=getSets(ex.role,wp);
  const initRows=existing?.length?existing
    :Array.from({length:targetSets},()=>({id:uid(),reps:"",kg:"",rpe:wp.rpe,done:false}));
  const [rows,setRows]=useState(initRows);
  const [saving,setSaving]=useState(false);
  function updateRow(id,f,v){setRows(r=>r.map(row=>row.id===id?{...row,[f]:v}:row));}
  function addRow(){setRows(r=>[...r,{id:uid(),reps:"",kg:"",rpe:wp.rpe,done:false}]);}
  function removeRow(id){if(rows.length>1)setRows(r=>r.filter(row=>row.id!==id));}
  function effLoad(row){
    if(!ex.cali)return row.kg!==""?`${row.kg} kg`:"—";
    const k=Number(row.kg);
    if(row.kg===""||row.kg===undefined)return`${bodyWeight} kg cuerpo`;
    if(k<0)return`${bodyWeight+k} kg efectivos (−${Math.abs(k)} kg asistencia)`;
    if(k>0)return`${bodyWeight+k} kg efectivos (+${k} kg lastrado)`;
    return`${bodyWeight} kg peso corporal`;
  }
  async function handleSave(){setSaving(true);await onSave(rows);setSaving(false);}

  // Autoguardado: cada cambio en las series se guarda solo, sin esperar el botón.
  const [justSaved,setJustSaved]=useState(false);
  const isFirstRender=useRef(true);
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    const t=setTimeout(()=>{
      if(onAutoSave){
        onAutoSave(rows);
        setJustSaved(true);
        const t2=setTimeout(()=>setJustSaved(false),900);
        return()=>clearTimeout(t2);
      }
    },500);
    return()=>clearTimeout(t);
    // eslint-disable-next-line
  },[rows]);

  const v=ex.variantKey?VARIANTS[ex.variantKey]?.[wp.w]:null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:200,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",
        maxHeight:"92dvh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
          padding:"20px 20px 8px",flexShrink:0}}>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>
              {ex.name}{ex.cali&&<span style={{...S.tag(C.greenDim,C.green),marginLeft:6}}>CALI</span>}
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ex.muscle}</div>
          </div>
          <button onClick={onClose} style={{...S.btn,background:C.faint,borderRadius:8,padding:"4px 10px",color:C.text,fontSize:14}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"0 20px",flex:1,minHeight:0,WebkitOverflowScrolling:"touch"}}>
          {v&&(
            <div style={{padding:"9px 12px",borderRadius:10,marginBottom:12,
              background:v.deload?C.amberDim:C.greenDim,
              border:`1px solid ${v.deload?C.amber+"50":C.green+"50"}`}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>
                Variante S{wp.w}<VariantChip chip={v.chip} deload={v.deload}/>
              </div>
              <div style={{fontSize:12,fontWeight:700,color:v.deload?C.amber:C.green,lineHeight:1.35}}>{v.v}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4,fontStyle:"italic"}}>{v.cue}</div>
            </div>
          )}
          {ex.cali&&(
            <div style={{background:C.blueDim,border:`1px solid ${C.blue}40`,borderRadius:10,
              padding:"7px 12px",marginBottom:12,fontSize:11,color:C.blue,lineHeight:1.4}}>
              💡 KG: <b>0</b> = {bodyWeight} kg cuerpo · <b>negativo</b> = asistencia (banda) · <b>positivo</b> = lastrado (chaleco)
            </div>
          )}
          <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Objetivo: {targetSets}×{ex.reps} · RPE {wp.rpe}</div>
          {rows.map((row,i)=>(
            <div key={row.id} style={{background:C.card2,borderRadius:12,padding:"12px 14px",marginBottom:8,
              border:`1px solid ${row.done?C.green:C.border}`,transition:"border 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:13,fontWeight:700,color:row.done?C.green:C.text}}>Serie {i+1}</span>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>removeRow(row.id)} style={{...S.btn,background:C.redDim,color:C.red,padding:"3px 8px",borderRadius:7,fontSize:13,fontWeight:700}}>−</button>
                  <button onClick={()=>updateRow(row.id,"done",!row.done)} style={{...S.btn,
                    background:row.done?C.green:C.faint,color:row.done?"#fff":C.muted,
                    padding:"3px 10px",borderRadius:7,fontSize:12,fontWeight:700}}>
                    {row.done?"✓ Hecha":"Marcar"}
                  </button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[
                  {label:"REPS",field:"reps",placeholder:ex.reps},
                  {label:ex.cali?"KG (±)":"KG",field:"kg",placeholder:ex.cali?"0":"—"},
                  {label:"RPE REAL",field:"rpe",placeholder:String(wp.rpe)},
                ].map(f=>(
                  <div key={f.field}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{f.label}</div>
                    <input type="number" inputMode="decimal" value={row[f.field]}
                      onChange={e=>updateRow(row.id,f.field,e.target.value)} placeholder={f.placeholder}
                      style={{width:"100%",background:C.bg,border:`1px solid ${
                        f.field==="kg"&&Number(row.kg)<0?C.amber:f.field==="kg"&&Number(row.kg)>0?C.purple:C.border
                      }`,borderRadius:8,padding:"8px",color:f.field==="kg"
                        ?Number(row.kg)<0?C.amber:Number(row.kg)>0?C.purple:C.text:C.text,
                      fontSize:16,fontFamily:"inherit"}}/>
                  </div>
                ))}
              </div>
              {(row.reps||(row.kg!==""&&row.kg!==undefined))&&(
                <div style={{fontSize:11,color:C.muted,marginTop:6,fontStyle:"italic"}}>
                  → {effLoad(row)}{row.reps?` · ${row.reps} reps`:""}
                </div>
              )}
            </div>
          ))}
          <button onClick={addRow} style={{...S.btn,width:"100%",background:C.faint,color:C.muted,borderRadius:10,padding:"10px",fontSize:13,marginBottom:12}}>+ Agregar serie</button>
        </div>
        <div style={{flexShrink:0,padding:"12px 20px",paddingBottom:"calc(14px + env(safe-area-inset-bottom))",
          borderTop:`1px solid ${C.border}`,background:C.card}}>
          <div style={{fontSize:10,color:justSaved?C.green:C.muted,textAlign:"center",marginBottom:6,height:12,transition:"color 0.2s"}}>
            {justSaved?"✓ Guardado automáticamente":"Se guarda solo mientras escribes"}
          </div>
          <button onClick={handleSave} disabled={saving} style={{...S.btn,width:"100%",background:C.green,color:"#fff",borderRadius:12,padding:14,fontSize:15,fontWeight:700}}>
            {saving?"Guardando...":"Guardar y cerrar"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── PAGE HOY ──────────────────────────────────────────────────────────────────
function PageHoy({week,setWeek,logs,saveLogs,days,setDays}) {
  const [dayIdx,setDayIdx]=useState(0);
  const [modal,setModal]=useState(null);
  const [newExModal,setNewExModal]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const wp=PHASES.find(p=>p.w===week)||PHASES[0];
  const day=days[dayIdx];
  const today=new Date().toISOString().slice(0,10);
  const logKey=`${today}_w${week}_${day.id}`;
  const existingLog=logs[logKey];
  const doneCount=day.exercises.filter(ex=>existingLog?.exercises?.[ex.id]?.some(r=>r.done)).length;

  async function handleSaveEx(exId,rows) {
    const newLogs={...logs,[logKey]:{...existingLog,week,day:day.id,date:today,
      exercises:{...(existingLog?.exercises||{}),[exId]:rows}}};
    try{await window.storage.set("training_logs",JSON.stringify(newLogs));saveLogs(newLogs);}catch(e){}
    setModal(null);
  }
  async function handleAutoSaveEx(exId,rows) {
    saveLogs(prevLogs=>{
      const newLogs={...prevLogs,[logKey]:{...prevLogs[logKey],week,day:day.id,date:today,
        exercises:{...(prevLogs[logKey]?.exercises||{}),[exId]:rows}}};
      window.storage.set("training_logs",JSON.stringify(newLogs)).catch(()=>{});
      return newLogs;
    });
  }
  async function addExercise(ex) {
    const nd=days.map((d,i)=>i===dayIdx?{...d,exercises:[...d.exercises,ex]}:d);
    setDays(nd);try{await window.storage.set("custom_days",JSON.stringify(nd));}catch(e){}
  }
  async function removeExercise(exId) {
    const nd=days.map((d,i)=>i===dayIdx?{...d,exercises:d.exercises.filter(e=>e.id!==exId)}:d);
    setDays(nd);try{await window.storage.set("custom_days",JSON.stringify(nd));}catch(e){}
  }

  return (
    <div style={{padding:"16px 14px 0"}}>
      {/* Semana */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>Semana</div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
          {PHASES.map(p=>(
            <button key={p.w} onClick={()=>setWeek(p.w)} style={{...S.btn,flexShrink:0,width:40,height:40,
              borderRadius:10,fontSize:13,fontWeight:700,
              background:p.w===week?PHASE_DIM[p.cls]:C.card2,
              border:`1px solid ${p.w===week?PHASE_COL[p.cls]:C.border}`,
              color:p.w===week?PHASE_COL[p.cls]:C.muted}}>
              {p.w}
            </button>
          ))}
        </div>
      </div>
      <PhaseChip wp={wp}/>
      {/* Días */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {days.map((d,i)=>(
          <button key={d.id} onClick={()=>setDayIdx(i)} style={{...S.btn,flex:1,padding:"8px 4px",borderRadius:10,fontSize:12,fontWeight:700,
            background:i===dayIdx?d.color+"22":C.card2,border:`1px solid ${i===dayIdx?d.color:C.border}`,color:i===dayIdx?d.color:C.muted}}>
            {d.name}
          </button>
        ))}
      </div>
      {/* Progreso */}
      {existingLog&&(
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}>
            <span>Progreso sesión</span>
            <span style={{color:C.green,fontWeight:700}}>{doneCount}/{day.exercises.length}</span>
          </div>
          <div style={{height:4,background:C.faint,borderRadius:4}}>
            <div style={{height:4,borderRadius:4,background:C.green,
              width:`${day.exercises.length?(doneCount/day.exercises.length)*100:0}%`,transition:"width 0.3s"}}/>
          </div>
        </div>
      )}
      {wp.deload&&(
        <div style={{background:C.amberDim,border:`1px solid ${C.amber}50`,borderRadius:10,
          padding:"8px 12px",marginBottom:12,fontSize:12,color:C.amber,lineHeight:1.5}}>
          ⚠ Deload — mitad de series · misma variante o bajar 1 nivel · RPE máximo 5
        </div>
      )}
      {/* Toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={()=>setNewExModal(true)} style={{...S.btn,flex:1,background:C.greenDim,color:C.green,
          border:`1px solid ${C.green}40`,borderRadius:10,padding:"8px",fontSize:12,fontWeight:700}}>+ Ejercicio</button>
        <button onClick={()=>setEditMode(e=>!e)} style={{...S.btn,flex:1,background:editMode?C.redDim:C.faint,
          color:editMode?C.red:C.muted,border:`1px solid ${editMode?C.red:C.border}`,borderRadius:10,padding:"8px",fontSize:12,fontWeight:700}}>
          {editMode?"✓ Listo":"Editar lista"}
        </button>
      </div>
      {/* Ejercicios */}
      <div style={{...S.card}}>
        {day.exercises.length===0&&(
          <div style={{padding:"24px",textAlign:"center",color:C.faint,fontSize:13}}>Sin ejercicios — agrega uno arriba</div>
        )}
        {day.exercises.map((ex,ei)=>{
          const logged=existingLog?.exercises?.[ex.id];
          const isDone=logged?.some(r=>r.done);
          const doneRows=logged?.filter(r=>r.done).length||0;
          const sets=getSets(ex.role,wp);
          const v=ex.variantKey?VARIANTS[ex.variantKey]?.[week]:null;
          const lastDone=logged?.filter(r=>r.done).slice(-1)[0];
          return (
            <div key={ex.id} style={{borderBottom:`1px solid ${C.border}`,
              background:isDone?C.greenDim+"60":"transparent",transition:"background 0.2s"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",cursor:editMode?"default":"pointer"}}
                onClick={()=>!editMode&&setModal(ex)}>
                {editMode?(
                  <button onClick={e=>{e.stopPropagation();removeExercise(ex.id);}} style={{...S.btn,
                    background:C.redDim,color:C.red,borderRadius:8,width:28,height:28,
                    fontSize:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}}>×</button>
                ):(
                  <div style={{fontSize:11,color:C.faint,...S.mono,minWidth:20,paddingTop:2}}>{String(ei+1).padStart(2,"0")}</div>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    {ex.name}
                    {ex.cali&&<span style={S.tag(C.greenDim,C.green)}>CALI</span>}
                    {v&&!editMode&&<VariantChip chip={v.chip} deload={v.deload}/>}
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ex.muscle}</div>
                  {v&&!editMode&&(
                    <div style={{fontSize:11,color:v.deload?C.amber:C.green,marginTop:4,lineHeight:1.35,fontStyle:"italic"}}>{v.v}</div>
                  )}
                  {logged&&(
                    <div style={{fontSize:11,color:C.green,marginTop:3,fontWeight:600}}>
                      ✓ {doneRows}/{logged.length} series{lastDone?.reps?` · ${lastDone.reps} reps`:""}
                      {lastDone?.kg!==""&&lastDone?.kg!==undefined&&(
                        <span style={{color:Number(lastDone.kg)<0?C.amber:Number(lastDone.kg)>0?C.purple:C.muted}}>
                          {Number(lastDone.kg)<0?` · −${Math.abs(Number(lastDone.kg))}kg asist.`:Number(lastDone.kg)>0?` · +${lastDone.kg}kg lastrado`:""}
                        </span>
                      )}
                    </div>
                  )}
                </div>
                {!editMode&&(
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:15,fontWeight:700,...S.mono}}>{sets}×{ex.reps}</div>

                )}
              </div>
            </div>
          );
        })}
      </div>
      {modal&&<ExModal ex={modal} wp={wp} existing={existingLog?.exercises?.[modal.id]}
        onSave={rows=>handleSaveEx(modal.id,rows)} onAutoSave={rows=>handleAutoSaveEx(modal.id,rows)}
        onClose={()=>setModal(null)} bodyWeight={105}/>}
      {newExModal&&<NewExModal onAdd={addExercise} onClose={()=>setNewExModal(false)}/>}
    </div>
  );
}

// ── PAGE STATS ────────────────────────────────────────────────────────────────
function PageStats({logs,week,days,setLogs,setWeek,setDays}) {
  const entries=Object.values(logs);
  const doneRows=entries.flatMap(e=>Object.values(e.exercises||{}).flat()).filter(r=>r.done);
  const totalSeries=doneRows.length;
  const allRpe=doneRows.map(r=>Number(r.rpe)).filter(Boolean);
  const avgRpe=allRpe.length?(allRpe.reduce((a,b)=>a+b,0)/allRpe.length).toFixed(1):"—";
  const volumen=doneRows.reduce((acc,r)=>acc+(Number(r.reps)||0)*(105+Number(r.kg||0)),0);
  const dates=[...new Set(entries.map(e=>e.date))].sort();
  let streak=0;
  if(dates.length){let d=new Date();while(true){const ds=d.toISOString().slice(0,10);if(dates.includes(ds)){streak++;d.setDate(d.getDate()-1);}else break;}}
  const bySemana={};
  entries.forEach(e=>{bySemana[e.week]=(bySemana[e.week]||0)+1;});
  const semanas=Object.entries(bySemana).sort((a,b)=>Number(a[0])-Number(b[0])).slice(-8);
  const maxS=Math.max(...semanas.map(s=>s[1]),1);
  const StatCard=({label,value,sub,color=C.green})=>(
    <div style={{background:C.card2,borderRadius:14,padding:"14px 16px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:4}}>{label}</div>
      <div style={{fontSize:26,fontWeight:800,color,lineHeight:1,...S.mono}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
  const fileInputRef=useRef(null);
  const [backupMsg,setBackupMsg]=useState("");

  function handleExport(){
    const payload={
      training_logs:logs, current_week:week, custom_days:days,
      exported_at:new Date().toISOString(), app:"rutina-tracker", version:1,
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const fecha=new Date().toISOString().slice(0,10);
    a.href=url; a.download=`rutina-backup-${fecha}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setBackupMsg("✓ Respaldo descargado");
    setTimeout(()=>setBackupMsg(""),2500);
  }

  function handleImportFile(e){
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        const newLogs=data.training_logs||{};
        const newWeek=Number(data.current_week)||1;
        const newDays=Array.isArray(data.custom_days)?data.custom_days:DEFAULT_DAYS;
        setLogs(newLogs);
        setWeek(newWeek);
        setDays(newDays);
        try{
          await window.storage.set("training_logs",JSON.stringify(newLogs));
          await window.storage.set("current_week",String(newWeek));
          await window.storage.set("custom_days",JSON.stringify(newDays));
        }catch(err){}
        setBackupMsg("✓ Datos restaurados");
      }catch(err){
        setBackupMsg("✕ Archivo inválido");
      }
      setTimeout(()=>setBackupMsg(""),2500);
      e.target.value="";
    };
    reader.readAsText(file);
  }

  return (
    <div style={{padding:"16px 14px 0"}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>Estadísticas</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <StatCard label="Sesiones" value={entries.length} sub="desde el inicio"/>
        <StatCard label="Esta semana" value={entries.filter(e=>e.week===week).length} sub={`semana ${week}`} color={C.blue}/>
        <StatCard label="Series ✓" value={totalSeries} sub="completadas" color={C.purple}/>
        <StatCard label="Racha" value={`${streak}d`} sub="días seguidos" color={C.amber}/>
      </div>
      <div style={{...S.card,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:2,textTransform:"uppercase"}}>RPE PROMEDIO REAL</div>
        <div style={{fontSize:32,fontWeight:800,color:C.green,...S.mono}}>{avgRpe}</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:8}}>de {allRpe.length} series</div>
        {allRpe.length>0&&<div style={{height:6,background:C.faint,borderRadius:4}}><div style={{height:6,borderRadius:4,background:C.green,width:`${(Number(avgRpe)/10)*100}%`}}/></div>}
      </div>
      <div style={{...S.card,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:2,textTransform:"uppercase"}}>VOLUMEN ACUMULADO</div>
        <div style={{fontSize:28,fontWeight:800,color:C.purple,...S.mono}}>{Math.round(volumen).toLocaleString()}</div>
        <div style={{fontSize:11,color:C.muted}}>kg·rep (reps × carga efectiva)</div>
      </div>
      <div style={{...S.card,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:12,textTransform:"uppercase"}}>SESIONES POR SEMANA</div>
        {semanas.length===0?(
          <div style={{fontSize:13,color:C.faint,textAlign:"center",padding:"16px 0"}}>Sin datos aún</div>
        ):(
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
            {semanas.map(([sw,count])=>(
              <div key={sw} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:10,color:C.muted,...S.mono}}>{count}</div>
                <div style={{width:"100%",borderRadius:"4px 4px 0 0",
                  background:Number(sw)===week?C.green:C.blue,
                  height:`${Math.round((count/maxS)*60)}px`,minHeight:4}}/>
                <div style={{fontSize:9,color:C.muted}}>S{sw}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{...S.card,padding:"14px 16px"}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>RESPALDO DE DATOS</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.4}}>
          Descarga un archivo con todo tu progreso (sesiones, semana actual, ejercicios). Guárdalo en tu correo, Drive o Notas — así no dependes solo de este navegador.
        </div>
        <div style={{display:"flex",gap:8,marginBottom:backupMsg?8:0}}>
          <button onClick={handleExport} style={{...S.btn,flex:1,background:C.greenDim,color:C.green,border:`1px solid ${C.green}50`,borderRadius:10,padding:"11px",fontSize:13,fontWeight:700}}>
            ⬇ Exportar
          </button>
          <button onClick={()=>fileInputRef.current?.click()} style={{...S.btn,flex:1,background:C.faint,color:C.text,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px",fontSize:13,fontWeight:700}}>
            ⬆ Importar
          </button>
          <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImportFile} style={{display:"none"}}/>
        </div>
        {backupMsg&&<div style={{fontSize:12,color:backupMsg.startsWith("✓")?C.green:C.red,textAlign:"center",fontWeight:700}}>{backupMsg}</div>}
      </div>
      <SyncCard/>
    </div>
  );
}

function SyncCard() {
  const [code,setCode]=useState(null);
  const [copied,setCopied]=useState(false);
  useEffect(()=>{
    try{ const c=localStorage.getItem("trk_sync_code"); if(c) setCode(c); }catch(e){}
  },[]);
  if(!code) return null;
  function handleCopy(){
    try{ navigator.clipboard.writeText(code); setCopied(true); setTimeout(()=>setCopied(false),1500); }catch(e){}
  }
  function handleChange(){
    let ok=true;
    try{ ok=window.confirm("¿Cambiar de código? Vas a tener que volver a ingresar uno (nuevo o existente) para sincronizar."); }catch(e){}
    if(!ok)return;
    try{ localStorage.removeItem("trk_sync_code"); }catch(e){}
    try{ window.location.reload(); }catch(e){}
  }
  return (
    <div style={{...S.card,padding:"14px 16px",marginTop:12}}>
      <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>SINCRONIZACIÓN ENTRE DISPOSITIVOS</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.4}}>
        Usa este mismo código en otro celular o computador para ver los mismos datos ahí.
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",
          fontSize:16,fontWeight:800,letterSpacing:1,textAlign:"center",...S.mono,color:C.green}}>{code}</div>
        <button onClick={handleCopy} style={{...S.btn,background:C.greenDim,color:C.green,border:`1px solid ${C.green}50`,borderRadius:8,padding:"10px 14px",fontSize:12,fontWeight:700}}>{copied?"✓":"Copiar"}</button>
      </div>
      <button onClick={handleChange} style={{...S.btn,width:"100%",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px",fontSize:12}}>Cambiar código</button>
    </div>
  );
}

// ── PAGE HISTORIAL ────────────────────────────────────────────────────────────
function PageHistorial({logs,days}) {
  const entries=Object.values(logs).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,40);
  const allEx=days.flatMap(d=>d.exercises);
  const dayColor={lun:C.green,mie:C.blue,vie:C.purple};
  const dayName={lun:"Lunes",mie:"Miércoles",vie:"Viernes"};
  if(!entries.length)return(
    <div style={{padding:"60px 14px",textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>📭</div>
      <div style={{fontSize:16,fontWeight:700,color:C.muted}}>Sin sesiones aún</div>
      <div style={{fontSize:13,color:C.faint,marginTop:6}}>Ve a Hoy y registra tu primer entreno</div>
    </div>
  );
  return (
    <div style={{padding:"16px 14px 0"}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>Historial</div>
      {entries.map((e,i)=>{
        const exKeys=Object.keys(e.exercises||{});
        const totalDone=exKeys.flatMap(k=>(e.exercises[k]||[]).filter(r=>r.done)).length;
        const color=dayColor[e.day]||C.muted;
        const ph=PHASES.find(p=>p.w===e.week);
        return (
          <div key={i} style={{...S.card,marginBottom:10,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
                  <div style={{fontSize:14,fontWeight:700}}>{dayName[e.day]||e.day}</div>
                  {ph&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:color+"22",color}}>{ph.tag}</span>}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:4,paddingLeft:16}}>{e.date} · Semana {e.week}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:800,...S.mono,color}}>{totalDone}</div>
                <div style={{fontSize:10,color:C.muted}}>series ✓</div>
              </div>
            </div>
            {exKeys.length>0&&(
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                {exKeys.map(exId=>{
                  const ex=allEx.find(e=>e.id===exId);
                  const rows=(e.exercises[exId]||[]).filter(r=>r.done);
                  if(!rows.length)return null;
                  const rpes=rows.map(r=>Number(r.rpe)).filter(Boolean);
                  const avgRpe=rpes.length?(rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1):null;
                  const lastKg=rows.slice(-1)[0]?.kg;
                  const v=ex?.variantKey?VARIANTS[ex.variantKey]?.[e.week]:null;
                  return (
                    <div key={exId} style={{padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                        <span style={{color:C.muted}}>{ex?.name||exId}</span>
                        <span style={{color:C.text,...S.mono}}>{rows.length}×{rows[0]?.reps||"?"}</span>
                      </div>
                      {v&&<div style={{fontSize:10,color:C.green,fontStyle:"italic",marginTop:2,lineHeight:1.3}}>{v.v}</div>}
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                        {avgRpe&&<span style={{fontSize:11,color:C.muted}}>RPE {avgRpe}</span>}
                        {lastKg!==""&&lastKg!==undefined&&(
                          <span style={{fontSize:11,color:Number(lastKg)<0?C.amber:Number(lastKg)>0?C.purple:C.muted,...S.mono}}>
                            {Number(lastKg)<0?`−${Math.abs(Number(lastKg))}kg asist.`:Number(lastKg)>0?`+${lastKg}kg lastrado`:`peso corporal`}
                          </span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── PAGE PROGRESIÓN ───────────────────────────────────────────────────────────
function PageProgresion({week}) {
  const PROG_LIST=[
    {name:"Dominadas",key:"dominadas"},
    {name:"Flexiones con déficit",key:"flexiones"},
    {name:"Step alto (rodilla sensible)",key:"step"},
    {name:"Remo invertido",key:"remo"},
    {name:"Fondos en paralelas",key:"fondos"},
  ];
  return (
    <div style={{padding:"16px 14px 0"}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Progresión</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Avanza cuando dominas la variante 2 sesiones seguidas · 👈 semana actual</div>
      {PROG_LIST.map(prog=>(
        <div key={prog.key} style={{...S.card,marginBottom:12}}>
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:14,fontWeight:700,color:C.green}}>{prog.name}</div>
          </div>
          {Array.from({length:12},(_,i)=>i+1).map(w=>{
            const v=VARIANTS[prog.key][w];
            const ph=PHASES.find(p=>p.w===w);
            const isCurrent=w===week;
            const cc=CHIP_COLORS[v.chip]||{bg:C.faint,text:C.muted};
            return (
              <div key={w} style={{display:"flex",gap:10,padding:"9px 14px",
                borderBottom:w<12?`1px solid ${C.border}`:"none",
                background:isCurrent?cc.bg+"80":"transparent"}}>
                <div style={{flexShrink:0,width:28,paddingTop:2}}>
                  <div style={{fontSize:13,fontWeight:800,color:isCurrent?PHASE_COL[ph?.cls]:C.faint,...S.mono}}>S{w}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,color:v.deload?C.amber:C.green,lineHeight:1.35}}>
                    {v.v}
                    <span style={{background:cc.bg,color:cc.text,fontSize:9,fontWeight:700,padding:"1px 5px",
                      borderRadius:4,marginLeft:5,verticalAlign:"middle",
                      border:v.deload?`1px dashed ${C.amber}`:"none"}}>{v.chip}</span>
                  </div>
                  <div style={{fontSize:10.5,color:C.muted,marginTop:3,fontStyle:"italic",lineHeight:1.3}}>{v.cue}</div>
                </div>
                {isCurrent&&<span style={{fontSize:14,flexShrink:0,paddingTop:2}}>👈</span>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("hoy");
  const [week,setWeek]=useState(1);
  const [logs,setLogs]=useState({});
  const [days,setDays]=useState(DEFAULT_DAYS);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("training_logs");if(r?.value)setLogs(JSON.parse(r.value));}catch(e){}
      try{const r=await window.storage.get("current_week");if(r?.value)setWeek(Number(r.value));}catch(e){}
      try{const r=await window.storage.get("custom_days");if(r?.value)setDays(JSON.parse(r.value));}catch(e){}
      setLoading(false);
    })();
  },[]);

  const handleSetWeek=useCallback(async(w)=>{
    setWeek(w);try{await window.storage.set("current_week",String(w));}catch(e){}
  },[]);

  if(loading)return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>💪</div>
        <div style={{color:C.muted}}>Cargando tu plan...</div>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,overflow:"hidden"}}>
      <div style={{...S.page,width:"100%"}}>
        {tab==="hoy"   &&<PageHoy   week={week} setWeek={handleSetWeek} logs={logs} saveLogs={setLogs} days={days} setDays={setDays}/>}
        {tab==="nutri" &&<PageNutri/>}
        {tab==="stats" &&<PageStats  week={week} logs={logs} days={days} setLogs={setLogs} setWeek={handleSetWeek} setDays={setDays}/>}
        {tab==="hist"  &&<PageHistorial logs={logs} days={days}/>}
        {tab==="prog"  &&<PageProgresion week={week}/>}
      </div>
      <NavBar tab={tab} setTab={setTab}/>
    </div>
  );
}


window.__renderApp = function(){
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
};
</script>
</body>
</html>
